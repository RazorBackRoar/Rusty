<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Rusty">
  <!-- In-app brand mark — matches the app icon's orange-to-blue identity. -->
  <defs>
    <linearGradient id="bg" x1="0.08" y1="0.02" x2="0.92" y2="0.98">
      <stop offset="0"    stop-color="#FFB254"/>
      <stop offset="0.38" stop-color="#FF7040"/>
      <stop offset="0.72" stop-color="#5D7BF7"/>
      <stop offset="1"    stop-color="#2E7CF6"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.4" stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="1"   stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EEF2FB"/>
    </linearGradient>
    <linearGradient id="lines" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF8A50"/>
      <stop offset="1" stop-color="#4D7EF0"/>
    </linearGradient>
    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="22" stdDeviation="30" flood-color="#102048" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#sheen)"/>

  <!-- Duplicate "cards" mark -->
  <g filter="url(#cardShadow)">
    <rect x="262" y="212" width="430" height="524" rx="70" fill="#FFFFFF" opacity="0.42"/>
    <rect x="354" y="304" width="430" height="524" rx="70" fill="url(#card)"/>
  </g>

  <!-- Content lines on the front card -->
  <g fill="url(#lines)">
    <rect x="424" y="410" width="274" height="42" rx="21"/>
    <rect x="424" y="500" width="224" height="42" rx="21"/>
    <rect x="424" y="590" width="310" height="42" rx="21"/>
  </g>
</svg>
